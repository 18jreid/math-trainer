name: Deploy to TrueNAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t math-trainer:latest .

      - name: Deploy
        run: |
          docker compose \
            -p ix-math-trainer \
            -f /mnt/.ix-apps/app_configs/math-trainer/versions/1.0.0/templates/rendered/docker-compose.yaml \
            up -d --force-recreate
